name: Java CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show repository structure
        run: |
          pwd
          ls -R

      - name: Build Application
        working-directory: expense_manager_backend
        run: mvn -B clean package

      - name: Run Tests
        working-directory: expense_manager_backend
        run: mvn test

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to payslate-server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@13.203.132.99 << 'EOF'
            cd /home/ubuntu/payslate/expense_manager_backend
            git pull origin main
            mvn clean package
            sudo systemctl restart app
          EOF
